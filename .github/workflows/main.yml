name: Build Win7 32-bit EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Code herunterladen
      uses: actions/checkout@v4
    
    - name: Python 3.8 (32-bit) einrichten
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
        architecture: 'x86'    # DAS ist der magische Befehl für 32-Bit!
        
    - name: Bibliotheken installieren
      run: |
        python -m pip install --upgrade pip
        pip install pyserial pyautogui pyinstaller
        
    - name: EXE mit PyInstaller bauen
      run: pyinstaller --onefile --windowed waagen_wedge.py
      
    - name: Fertige EXE als Download bereitstellen
      uses: actions/upload-artifact@v4
      with:
        name: WaagenSoftware-Win7-32bit
        path: dist/waagen_wedge.exe
